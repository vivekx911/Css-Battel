<html>
  <title>Creative Buttons</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#131c33;
    }

    .buttons{
      display:flex;
      gap:25px;
      flex-wrap:wrap;
    }

    button{
      padding:14px 32px;
      font-size:16px;
      cursor:pointer;
      transition:.3s;
    }

    .button1{
      border:none;
      border-radius:40px;
      color:white;
      background:linear-gradient(45deg,#4ee3d0,#249712);
      box-shadow:0 6px 14px rgba(44, 224, 53, 0.81);
    }

    .button1:hover{
      transform:translateY(-4px);
      box-shadow:0 12px 25px rgba(45, 240, 94, 0.5);
    }

    .button2{
      background:transparent;
      color:#00d9ff;
      border:2px solid #00d9ff;
      position:relative;
      overflow:hidden;
    }

    .button2::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:#00d9ff;
      transition:.3s;
      z-index:-1;
    }

    .button2:hover::before{
      left:0;
    }

    .button2:hover{
      color:#111;
    }

    .button3{
      border:none;
      color:white;
      border-radius:12px;
      background:#1b1f2a;
      border:2px solid transparent;
    }

    .button3:hover{
      border-color:#5e36bc;
      transform:scale(1.05);
      box-shadow:0 0 18px rgba(114, 72, 211, 0.5);
    }

  </style>
</head>
<body>

  <div class="buttons">
    <button class="button1">HQ</button>
    <button class="button2">HQ</button>
    <button class="button3">HQ</button>
  </div>

</body>
</html>
